<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>[mawiblah_title]</title>
    <style>
        body { font-family: Helvetica, Arial, sans-serif; line-height: 1.6; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; }
        .header { text-align: center; margin-bottom: 30px; }
        .content { margin-bottom: 30px; }
        .articles { list-style: none; padding: 0; }
        .footer { font-size: 12px; color: #999; text-align: center; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
        a { color: #0073aa; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            [mawiblah_logo_src]
        </div>
        
        <h1>[mawiblah_title]</h1>
        
        <div class="content">
            [mawiblah_content]
        </div>

        <h2>[mawiblah_newest_articles_title]</h2>
        <p>[mawiblah_newest_articles_paragraph]</p>
        
        <ul class="articles">
            [mawiblah_newest_articles count="3"]
        </ul>

        <div class="footer">
            <h3>[mawiblah_end_title]</h3>
            <p>[mawiblah_end_content]</p>
            <div style="margin-bottom: 15px;">
                [mawiblah_social_profiles]
            </div>
            <p>[mawiblah_unsubscribe]</p>
        </div>
    </div>
</body>
</html>
